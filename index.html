        --bg: #080808;
        --panel: #111;
        --border: #333;

body {
margin: 0;
background-color: var(–bg);
height: 100vh;
height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
font-family: ‘Courier New’, Courier, monospace;
color: var(–accent);
overflow: hidden;
user-select: none;
-webkit-user-select: none;
}

.viewport {
position: relative;
width: 100%;
height: 45vh;
min-height: 240px;
max-width: 100%;
background: #000;
border-bottom: 2px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
flex-shrink: 0;
}

canvas {
height: 100%;
width: auto;
image-rendering: pixelated;
display: block;
box-shadow: 0 0 20px rgba(0,0,0,0.5);

.vignette {
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;

align-items: center;
justify-content: center;
gap: 15px;
padding: 20px;
text-align: center;
}

.overlay h2 { margin: 0; color: var(–highlight); font-size: 18px; text-transform: uppercase; border-bottom: 1px solid var(–highlight); padding-bottom: 5px; }

.controls {
flex-grow: 1;
width: 100%;
max-width: 430px;
background: #000;
padding: 12px;
padding-bottom: 30px;

flex-direction: column;
gap: 8px;
overflow-y: auto;

display: flex;
justify-content: space-between;
align-items: center;
gap: 8px;

border: none;

font-weight: 600;

button:active {
background: #3a3a3c;

select {
text-align: center;

flex-direction: column;
gap: 8px;
padding: 0 2px;

.mode-option {

align-items: center;

height: 58px;

</div>


<button id="settingsToggle" onclick="toggleSettings()">▼ OPTIONS ▼</button>

<div id="settingsPanel">

            <option value="auto">AUTO FMT</option>
        </select>
    </div>


<div class="slider-group">

    <input type="range" id="zoomRange" min="10" max="75" value="10" oninput="playSound('tick')">
</div>

<div class="slider-group">
    <div class="slider-label"><span>LENS BLUR</span> <span>CHROMA SHIFT</span></div>
    <input type="range" id="blurRange" min="0" max="80" value="0" oninput="playSound('tick')">
    <input type="range" id="chromaRange" min="0" max="100" value="40" oninput="playSound('tick')">
</div>

<div class="slider-group">
    <div class="slider-label"><span>MOTION BLUR / LAG</span></div>
    <input type="range" id="lagRange" min="0" max="100" value="20" oninput="playSound('tick')">
</div>

<div class="slider-group">
    <div class="slider-label"><span>COMPRESSION</span> <span>SHARPNESS</span></div>
    <div style="display:flex; gap:5px;">
        <input type="range" id="compressionRange" min="0" max="100" value="50" oninput="playSound('tick')">
        <input type="range" id="sharpnessRange" min="0" max="100" value="50" oninput="playSound('tick')">
    </div>
</div>

<div id="vhsControls" class="custom-ui-panel">
    <div class="ui-label">VHS OVERLAY</div>
    <input type="text" id="vhsText" value="PLAY >">
    <div style="display:flex; gap:5px; margin-top:4px;">
        <input type="text" id="vhsDateInput" value="AUTO" style="flex-grow:2">
        <input type="text" id="vhsSpeedInput" value="AUTO" style="width: 40px; text-align:center;">
    </div>
    <div class="slider-label" style="margin-top:4px;">TRACKING NOISE</div>
    <input type="range" id="trackingRange" min="0" max="100" value="15" oninput="playSound('tick')">
</div>


</div>

<div class="controls-bottom">
    <div class="mode-switch" id="modeSwitch">
        <div class="mode-option active" id="modePhoto" onclick="switchMode('photo')">PHOTO</div>

    </div>
    <button id="shutterBtn" onclick="handleShutter()">

</div>

    canvas.width = w; canvas.height = h;
    tempC.width = w; tempC.height = h; tempCtx = tempC.getContext('2d');
    processedC.width = w; processedC.height = h; pCtx = processedC.getContext('2d');
    tearC.width = w; tearC.height = h; tearCtx = tearC.getContext('2d');

    const nID = nCtx.createImageData(w, h);

        if (Math.random() > 0.995) {
            const val = Math.random() * 40; 
            nID.data[i] = val; nID.data[i+1] = val; nID.data[i+2] = val; 
            nID.data[i+3] = Math.random() * 30;

function makeDistortionCurve(amount) {
    const k = typeof amount === 'number' ? amount : 50;
    const n_samples = 44100; const curve = new Float32Array(n_samples); const deg = Math.PI / 180;
    for (let i = 0; i < n_samples; ++i) {
        const x = i * 2 / n_samples - 1;
        curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
    }
    return curve;
}

function playSound(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); 
    const now = audioCtx.currentTime;
    
    if (type === 'click') {
        osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
        gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
    } else if (type === 'tick') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, now);
        gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
        osc.start(now); osc.stop(now + 0.02);
    } else if (type === 'shutter') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    }
}

async function startCamera(retryStage = 0) {
    status.style.display = 'block'; status.innerText = "FINDING CAMERA...";
    sourceType = 'camera'; sourceBtn.innerText = "SRC: CAM";
    
    try {
        stopCamera();
        const constraints = { video: { facingMode: currentFacingMode, width: { ideal: 640 } }, audio: true };
        if (retryStage === 2) constraints.audio = false;

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        
        const hasVideo = stream.getVideoTracks().length > 0;
        const hasAudio = stream.getAudioTracks().length > 0;
        
        if (retryStage < 2 && constraints.audio && !hasAudio && hasVideo) {
            stream.getTracks().forEach(t => t.stop());
            setTimeout(() => startCamera(2), 300);
            return;
        }

        const track = stream.getVideoTracks()[0];
        if (track) {
            const caps = track.getCapabilities();
            if (caps && caps.torch) {
                flashBtn.style.display = 'block';
                flashBtn.innerText = "FLASH";
                flashBtn.style.color = "#fff";
                isFlashOn = false;
            } else {
                flashBtn.style.display = 'none';
            }
        }

        currentStream = stream; video.srcObject = stream; video.muted = true;
        video.onloadedmetadata = () => {
            video.play().then(() => {
                status.style.display = 'none'; cameraFailOverlay.style.display = 'none';
                if (stream.getAudioTracks().length > 0) initAudioProcessing(stream);
            });
        };
    } catch (err) {
        if (retryStage === 0) setTimeout(() => startCamera(1), 500);
        else if (retryStage === 1) startCamera(2);
        else { status.style.display = 'none'; cameraFailOverlay.style.display = 'flex'; }
    }
}

flipBtn.onclick = async () => {
    if (sourceType !== 'camera') return;
    playSound('click');
    currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
    
    const oldVideoTrack = currentStream ? currentStream.getVideoTracks()[0] : null;
    
    try {
        const newVideoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode, width: { ideal: 640 } },
            audio: false
        });
        
        const newVideoTrack = newVideoStream.getVideoTracks()[0];
        
        if (currentStream) {
            if (oldVideoTrack) oldVideoTrack.stop();
            currentStream.getVideoTracks().forEach(track => currentStream.removeTrack(track));
            currentStream.addTrack(newVideoTrack);
            
            video.srcObject = null;
            video.srcObject = currentStream;
            
            const caps = newVideoTrack.getCapabilities();
            if (caps && caps.torch) {
                flashBtn.style.display = 'block';
                isFlashOn = false;
                flashBtn.innerText = "FLASH";
                flashBtn.style.color = "#fff";

        startCamera();
    }
};

function initAudioProcessing(stream, elementSource = null) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (noiseNode) { try { noiseNode.stop(); } catch(e){} noiseNode.disconnect(); }
    if (keepAliveOsc) { try { keepAliveOsc.stop(); } catch(e){} keepAliveOsc.disconnect(); }
    if (audioStreamDestination) audioStreamDestination.disconnect();

    audioStreamDestination = audioCtx.createMediaStreamDestination();

    const silentOsc = audioCtx.createOscillator();
    const silentGain = audioCtx.createGain();
    silentOsc.type = 'sine';
    silentOsc.frequency.value = 440;
    silentGain.gain.value = 0.0001;
    silentOsc.connect(silentGain);
    silentGain.connect(audioStreamDestination);
    silentOsc.start();
    keepAliveOsc = silentOsc;

    let source = elementSource || audioCtx.createMediaStreamSource(stream);
    
    const mode = modes[modeIndex];
    const settings = mode.audio || {hp: 300, lp: 3500, noise: 0.001, dist: 0};

    const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = settings.hp;
    const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = settings.lp;
    const dist = audioCtx.createWaveShaper(); dist.curve = makeDistortionCurve(settings.dist);
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -20; comp.ratio.value = 12;

    const bSize = audioCtx.sampleRate * 2; 
    const b = audioCtx.createBuffer(1, bSize, audioCtx.sampleRate);
    const d = b.getChannelData(0);
    for (let i = 0; i < bSize; i++) d[i] = (Math.random() * 2 - 1);
    
    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = b; noiseNode.loop = true;
    const nGain = audioCtx.createGain(); nGain.gain.value = settings.noise;
    noiseNode.connect(nGain); nGain.connect(comp);
    
    source.connect(hp); hp.connect(dist); dist.connect(lp); lp.connect(comp);
    
    comp.connect(audioStreamDestination);
    noiseNode.start();
}

// JPEG-style block compression simulation
function applyBlockCompression(imageData, blockSize, quality) {
    const d = imageData.data;
    const qFactor = 1 - (quality / 100);
    
    for (let by = 0; by < h; by += blockSize) {
        for (let bx = 0; bx < w; bx += blockSize) {
            let avgR = 0, avgG = 0, avgB = 0, count = 0;
            
            // Calculate average for block
            for (let y = by; y < Math.min(by + blockSize, h); y++) {
                for (let x = bx; x < Math.min(bx + blockSize, w); x++) {
                    const i = (y * w + x) * 4;
                    avgR += d[i];
                    avgG += d[i+1];
                    avgB += d[i+2];
                    count++;
                }
            }
            
            avgR /= count; avgG /= count; avgB /= count;
            
            // Apply averaged color back to block with quality factor
            for (let y = by; y < Math.min(by + blockSize, h); y++) {
                for (let x = bx; x < Math.min(bx + blockSize, w); x++) {
                    const i = (y * w + x) * 4;
                    d[i] = d[i] * (1 - qFactor) + avgR * qFactor;
                    d[i+1] = d[i+1] * (1 - qFactor) + avgG * qFactor;
                    d[i+2] = d[i+2] * (1 - qFactor) + avgB * qFactor;
                }
            }
        }
    }
}

// Chromatic aberration / purple fringing
function applyChromaticAberration(srcData, output, strength, purpleFringe) {
    const d = srcData.data;
    const o = output.data;
    const shift = Math.floor(strength / 15);
    
    for (let i = 0; i < d.length; i += 4) {
        const pIdx = i / 4;
        const x = pIdx % w;
        const y = Math.floor(pIdx / w);
        
        // Get shifted channels
        const rIdx = Math.max(0, Math.min(d.length - 4, i - shift * 4));
        const bIdx = Math.max(0, Math.min(d.length - 4, i + shift * 4));
        
        o[i] = d[rIdx];
        o[i+1] = d[i+1];
        o[i+2] = d[bIdx+2];
        o[i+3] = 255;
        
        // Add purple fringing on high contrast edges
        if (purpleFringe > 0) {
            const luma = (o[i] + o[i+1] + o[i+2]) / 3;
            const nextIdx = Math.min(d.length - 4, i + 4);
            const nextLuma = (d[nextIdx] + d[nextIdx+1] + d[nextIdx+2]) / 3;
            const contrast = Math.abs(luma - nextLuma);
            
            if (contrast > 80) {
                o[i] = Math.min(255, o[i] + purpleFringe * 35);
                o[i+2] = Math.min(255, o[i+2] + purpleFringe * 45);
            }
        }
    }
}

// VHS chroma bleeding
function applyChromaBleeding(imageData, strength) {
    const d = imageData.data;
    
    for (let y = 0; y < h; y++) {
        for (let x = 1; x < w - 1; x++) {
            const i = (y * w + x) * 4;
            const prevI = i - 4;
            const nextI = i + 4;
            
            // Bleed chroma channels horizontally
            d[i] = d[i] * 0.5 + d[prevI] * 0.25 + d[nextI] * 0.25;
            d[i+2] = d[i+2] * 0.5 + d[prevI+2] * 0.25 + d[nextI+2] * 0.25;
        }
    }
}

function render(time) {
    requestAnimationFrame(render);
    if (!lastFrameTime) lastFrameTime = time;
    const elapsed = time - lastFrameTime;
    if (elapsed < FRAME_INTERVAL) return;
    lastFrameTime = time - (elapsed % FRAME_INTERVAL);

    if (sourceType === 'video' || (video.readyState >= 2 && sourceType !== 'image') || (sourceType === 'image' && uploadedImage)) {
        const mode = modes[modeIndex];
        
        tempC.width = w; tempC.height = h;
        if (isMirrored) { tempCtx.translate(w, 0); tempCtx.scale(-1, 1); }
        
        if (sourceType === 'image' && uploadedImage) {
            tempCtx.clearRect(0, 0, w, h);
            
            if (keepAspectRatio) {
                // ORIG - Keep actual source aspect ratio, letterbox if needed
                const imgRatio = uploadedImage.width / uploadedImage.height;
                const canvasRatio = w / h;
                
                let drawW, drawH;
                if (imgRatio > canvasRatio) {
                    // Image wider - fit width, letterbox top/bottom
                    drawW = w;
                    drawH = w / imgRatio;
                } else {
                    // Image taller - fit height, letterbox sides
                    drawH = h;
                    drawW = h * imgRatio;
                }
                
                // Apply zoom
                const zoom = zoomRange.value / 10;
                const cropW = uploadedImage.width / zoom;
                const cropH = uploadedImage.height / zoom;
                const cropX = (uploadedImage.width - cropW) / 2;
                const cropY = (uploadedImage.height - cropH) / 2;
                
                // Draw centered with letterboxing
                tempCtx.drawImage(uploadedImage,
                    cropX, cropY, cropW, cropH,
                    (w - drawW) / 2, (h - drawH) / 2, drawW, drawH
                );
            } else {
                // FILL - Stretch entire image to fill canvas (may distort)
                const zoom = zoomRange.value / 10;
                const cropW = uploadedImage.width / zoom;
                const cropH = uploadedImage.height / zoom;
                const cropX = (uploadedImage.width - cropW) / 2;
                const cropY = (uploadedImage.height - cropH) / 2;
                
                tempCtx.drawImage(uploadedImage,
                    cropX, cropY, cropW, cropH,
                    0, 0, w, h
                );
            }
        } else {
            // Video or camera
            const z = zoomRange.value / 10;
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            
            if (keepAspectRatio) {
                // ORIG - Keep actual video/camera aspect ratio, letterbox if needed
                const videoRatio = vW / vH;
                const canvasRatio = w / h;
                
                let drawW, drawH;
                if (videoRatio > canvasRatio) {
                    // Video wider - fit width, letterbox top/bottom
                    drawW = w;
                    drawH = w / videoRatio;
                } else {
                    // Video taller - fit height, letterbox sides
                    drawH = h;
                    drawW = h * videoRatio;
                }
                
                // Apply zoom
                const cropW = vW / z;
                const cropH = vH / z;
                const cropX = (vW - cropW) / 2;
                const cropY = (vH - cropH) / 2;
                
                // Draw centered with letterboxing
                tempCtx.drawImage(video,
                    cropX, cropY, cropW, cropH,
                    (w - drawW) / 2, (h - drawH) / 2, drawW, drawH
                );
            } else {
                // FILL - Stretch entire video to fill canvas
                const cropW = vW / z;
                const cropH = vH / z;
                const cropX = (vW - cropW) / 2;
                const cropY = (vH - cropH) / 2;
                
                tempCtx.drawImage(video,
                    cropX, cropY, cropW, cropH,
                    0, 0, w, h
                );
            }
        }

        const srcData = tempCtx.getImageData(0, 0, w, h);
        const dSrc = srcData.data;
        let output = ctx.createImageData(w, h);
        const dOut = output.data;

        // Calculate exposure
        let totalBright = 0;
        let maxBright = 0;
        for(let i=0; i<dSrc.length; i+=64) {
            const b = (dSrc[i]+dSrc[i+1]+dSrc[i+2])/3;
            totalBright += b;
            if(b > maxBright) maxBright = b;
        }
        const avgBright = totalBright / (dSrc.length/64);
        
        let targetGain = (mode.aeTarget || 128) / (avgBright + 1);
        if (maxBright > 250) { targetGain *= 0.88; }

        if (exposureGain > targetGain * 1.5) shockStress = Math.min(shockStress + 0.05, 1.0);
        else shockStress = Math.max(shockStress - 0.01, 0);
        
        exposureGain += (targetGain - exposureGain) * 0.04;
        exposureGain = Math.max(0.2, Math.min(3.5, exposureGain));

        // White balance hunting
        let rBias = 0, bBias = 0;
        if (mode.colorCycle) {
            wbHuntStrength = Math.max(0, wbHuntStrength - 0.008);
            
            if (exposureGain > 2.0 || exposureGain < 0.5) {
                if (wbHuntStrength < 0.5) wbHuntStrength = 0.5;
            }
            
            if (wbHuntStrength <= 0 && Math.random() > 0.99) {
                wbHuntStrength = 1.0;
            }
            
            const huntSpeed = mode.cycleSpeed || 0.15;
            const huntAmp = (mode.cycleAmp || 0.25) * wbHuntStrength; 
            
            wbHuntPhase += huntSpeed;
            rBias = Math.sin(wbHuntPhase) * huntAmp;
            bBias = Math.cos(wbHuntPhase) * huntAmp;
        } else {
            wbHuntStrength = 0; 
        }

        const compVal = parseInt(compressionRange.value);
        const sharpVal = parseInt(sharpnessRange.value);
        const chromaVal = parseInt(chromaRange.value);
        
        // Reduce crush/blow amounts for lower contrast
        const crushMod = (compVal - 50) * 0.4;  // Reduced from 0.8
        const activeCrush = Math.max(0, Math.min(40, mode.crush + crushMod));  // Reduced max from 80
        const blowMod = (compVal - 50) * 0.4;  // Reduced from 0.8
        const activeBlow = Math.max(200, Math.min(255, mode.blow - blowMod));  // Raised min from 180
        
        // DISABLE banding - causes square lines artifacts
        const activeBanding = 1;  // Always 1 = no banding

        // Main pixel processing
        for (let i = 0; i < dSrc.length; i += 4) {
            let r = dSrc[i];
            let g = dSrc[i+1];
            let b = dSrc[i+2];

            // Dead pixels / hot pixels
            if (Math.random() > 0.99998) { dOut[i]=255; dOut[i+1]=255; dOut[i+2]=255; dOut[i+3]=255; continue; }

            let pGain = exposureGain;
            if (shockStress > 0) pGain *= (1.0 + shockStress * 0.5);

            pGain *= (mode.sat || 1.0);
            
            r *= pGain * mode.r * (1 + rBias);
            g *= pGain * mode.g;
            b *= pGain * mode.b * (1 + bBias);

            // Crush blacks and blow highlights
            if (r < activeCrush) r = 0; if (g < activeCrush) g = 0; if (b < activeCrush) b = 0;
            if (r > activeBlow) r = 255; if (g > activeBlow) g = 255; if (b > activeBlow) b = 255;

            // Sensor noise - MUCH LESS for smooth vintage look
            const luma = (r+g+b)/3;
            const shadowBoost = ((255-luma)/255);  // 0-1 range
            const noiseIntensity = mode.noiseAmount || 0.5;
            // REDUCED from (30) to (8) base noise
            const noiseAmp = (8 + shadowBoost * 15) * noiseIntensity * (1 - (sharpVal-50)/120);
            r += (Math.random()-0.5)*noiseAmp * 0.8;
            g += (Math.random()-0.5)*noiseAmp * 0.6;
            b += (Math.random()-0.5)*noiseAmp * 0.7;

            // Contrast
            if (mode.con !== 1.0) {
                r=(r-128)*mode.con+128; g=(g-128)*mode.con+128; b=(b-128)*mode.con+128; 
            }

            // Color quantization/banding
            if (activeBanding > 1) {
                r = Math.floor(r/activeBanding)*activeBanding;
                g = Math.floor(g/activeBanding)*activeBanding;
                b = Math.floor(b/activeBanding)*activeBanding;
            }

            dOut[i] = r; dOut[i+1] = g; dOut[i+2] = b; dOut[i+3] = 255;
        }

        // Apply chromatic aberration
        if (chromaVal > 5) {
            const chromaOut = ctx.createImageData(w, h);
            applyChromaticAberration(output, chromaOut, chromaVal, 0);
            output = chromaOut;
        }

        // NO MORE blockiness - real vintage cameras are smooth, not blocky

        processedC.getContext('2d').putImageData(output, 0, 0);

        // VHS chroma bleeding
        if (mode.type === "vhs" && mode.chromaBleed) {
            const vhsData = pCtx.getImageData(0, 0, w, h);
            applyChromaBleeding(vhsData, mode.chromaBleed);
            processedC.getContext('2d').putImageData(vhsData, 0, 0);
        }

        // Rolling shutter / scan lag
        const lagVal = parseInt(lagRange.value);
        let scanLag = mode.def.lag !== undefined ? mode.def.lag : (mode.lagMult * 35);
        scanLag = Math.max(5, Math.min(90, scanLag));

        if (scanLag > 5) {
            if (!rollingShutterBuffer) {
                rollingShutterBuffer = document.createElement('canvas');
                rollingShutterBuffer.width = w; rollingShutterBuffer.height = h;
                rollingShutterBuffer.getContext('2d').drawImage(processedC, 0, 0);
                shutterPhase = 0; 
            }
            const rsCtx = rollingShutterBuffer.getContext('2d');
            
            const scanSpeed = Math.max(8, Math.floor(h * (1.0 - (scanLag / 110))));
            
            if (shutterPhase + scanSpeed > h) {
                const firstH = h - shutterPhase;
                const secondH = scanSpeed - firstH;
                
                if (firstH > 0) {
                    rsCtx.drawImage(processedC, 0, shutterPhase, w, firstH, 0, shutterPhase, w, firstH);
                }
                
                if (secondH > 0) {
                    rsCtx.drawImage(processedC, 0, 0, w, secondH, 0, 0, w, secondH);
                }
                
                shutterPhase = secondH; 
            } else {
                rsCtx.drawImage(processedC, 0, shutterPhase, w, scanSpeed, 0, shutterPhase, w, scanSpeed);
                shutterPhase += scanSpeed;
            }
            
            pCtx.drawImage(rollingShutterBuffer, 0, 0);
        } else {
            pCtx.drawImage(processedC, 0, 0);
            rollingShutterBuffer = null; 
        }
        
        // NO LCD grid - causes visible lines that don't look vintage

        // Motion blur / LCD lag
        if (lagVal > 5) {
            if (!lcdDelayBuffer) { 
                lcdDelayBuffer = document.createElement('canvas'); 
                lcdDelayBuffer.width = w; lcdDelayBuffer.height = h; 
            }
            const dCtx = lcdDelayBuffer.getContext('2d');
            
            const curr = pCtx.getImageData(0,0,w,h).data;
            const prev = dCtx.getImageData(0,0,w,h).data;
            
            let diff = 0;
            for(let i=0; i<curr.length; i+=2000) diff += Math.abs(curr[i]-prev[i]);
            
            const motionThreshold = 8000 + (100-lagVal)*200;
            
            if (diff > motionThreshold) {
                const splitY = Math.random() * h;
                const shiftX = (Math.random() - 0.5) * (lagVal / 2);
                
                pCtx.drawImage(lcdDelayBuffer, 0, splitY, w, h-splitY, shiftX, splitY, w, h-splitY);
                
                pCtx.fillStyle = `rgba(${Math.random()*255}, ${Math.random()*255}, 0, 0.3)`;
                pCtx.fillRect(0, splitY, w, 2);
            }
            
            dCtx.drawImage(processedC, 0, 0);
        }

        // Soft focus - simpler approach that works on iPhone
        const blur = parseInt(blurRange.value);
        let blurPx = 0;
        if (blur > 0) {
            const aperture = mode.sensor ? mode.sensor.aperture : 2.8;
            const focalLength = mode.sensor ? mode.sensor.focalLength : 5.0;
            // Simple blur that works on all devices
            blurPx = (blur / 100) * (focalLength / aperture) * 2.5;
        }
        
        // Apply blur directly - iPhone compatible
        if (blurPx > 0.3) {
            pCtx.filter = `blur(${blurPx}px)`;
            pCtx.globalCompositeOperation = 'source-over';
            pCtx.globalAlpha = 1.0;
            pCtx.drawImage(processedC, 0, 0, w, h, 0, 0, w, h);
            pCtx.filter = 'none';
        }
        
        // Now draw to main canvas with lag opacity
        ctx.globalAlpha = Math.max(0.1, 1.0 - (lagVal/120));
        ctx.drawImage(processedC, 0, 0);
        ctx.globalAlpha = 1.0; 
        
        // Static noise overlay - CONTROLLED BY SHARPNESS (sharpVal already declared above)
        // Low sharpness = MORE static noise (0 sharpness = 0.8 opacity, 100 sharpness = 0.1 opacity)
        const noiseOpacity = 0.1 + (100 - sharpVal) / 100 * 0.7;
        ctx.globalAlpha = noiseOpacity; 
        ctx.drawImage(noiseCanvas, 0, 0);
        
        ctx.globalAlpha = 1.0; 

        if (mode.type === "vhs") drawVHSOverlay();
        
        recCtx.drawImage(canvas, 0, 0);
    }
}

function drawVHSOverlay() {
    const track = parseInt(trackingRange.value);
    if (track > 0) {
        const bh = Math.max(10, track*2.5);
        const den = Math.floor(track*1.5);
        for(let i=0; i<den; i++) {
        if(Math.random()>0.3) {
            ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.4})`;
            ctx.fillRect(Math.random()*w, h-bh+Math.random()*bh, Math.random()*40, 1);
        }
        }
    }
    
    ctx.fillStyle = "#eee"; ctx.font = "20px 'Courier New'"; ctx.shadowColor="black"; ctx.shadowBlur=4;
    ctx.textAlign = "left"; ctx.fillText(vhsTextIn.value, 15, 30);
    
    let dt = vhsDateIn.value.toUpperCase();
    if(dt==="AUTO") {
        const d=new Date(); const m=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        dt=`${m[d.getMonth()]} ${('0'+d.getDate()).slice(-2)} ${d.getFullYear()}`;
    }
    ctx.fillText(dt, 15, h-15);
    
    let spd = vhsSpeedIn.value.toUpperCase();
    if(spd==="AUTO") spd=["SP","LP","SLP"][Math.floor(Date.now()/10000)%3];
    const d=new Date();
    ctx.textAlign = "right"; ctx.fillText(`${spd} ${d.getHours()}:${('0'+d.getMinutes()).slice(-2)}`, w-15, 30);
    ctx.textAlign = "left";
}

function handleShutter() {
    if (captureMode === 'photo') {
        if (formatSelect.value.startsWith('video/')) return showStatus("FORMAT ERROR", true);
        capturePhoto();
    } else {
        if (formatSelect.value.startsWith('image/')) return showStatus("FORMAT ERROR", true);
        isRecording ? stopRecording() : startRecording();
    }
}

function capturePhoto() {
    playSound('shutter');
    const link = document.createElement('a');
    const fmt = formatSelect.value === 'auto' ? 'image/jpeg' : formatSelect.value;
    const ext = fmt.includes('png') ? 'png' : 'jpg';
    
    const mode = modes[modeIndex];
    
    // Export with proper aspect ratio
    let exportW, exportH;
    
    if (keepAspectRatio && uploadedImage) {
        // Keep original image aspect ratio
        const imgRatio = uploadedImage.width / uploadedImage.height;
        const maxDim = 2000; // Max dimension
        
        if (uploadedImage.width > uploadedImage.height) {
            exportW = Math.min(uploadedImage.width, maxDim);
            exportH = exportW / imgRatio;
        } else {
            exportH = Math.min(uploadedImage.height, maxDim);
            exportW = exportH * imgRatio;
        }
    } else {
        // Use phone mode's aspect ratio
        const modeRatio = w / h;
        const baseSize = mode.sensor ? Math.max(mode.sensor.w, mode.sensor.h) : 640;
        
        if (modeRatio >= 1) {
            exportW = baseSize;
            exportH = baseSize / modeRatio;
        } else {
            exportH = baseSize;
            exportW = baseSize * modeRatio;
        }
    }
    
    // Round to integers
    exportW = Math.round(exportW);
    exportH = Math.round(exportH);

    const upC = document.createElement('canvas');
    upC.width = exportW;
    upC.height = exportH;
    const upCtx = upC.getContext('2d');
    upCtx.imageSmoothingEnabled = false;
    
    // Draw canvas content maintaining aspect ratio - NO STRETCHING
    upCtx.drawImage(canvas, 0, 0, w, h, 0, 0, exportW, exportH);
    
    link.download = `${modes[modeIndex].name.replace(/\s/g,'_')}_${Date.now()}.${ext}`;
    link.href = upC.toDataURL(fmt, 0.9);
    link.click();
    
    showStatus("SAVED", false);
    setTimeout(() => {
        status.style.display='none';
        if (sourceType === 'camera') {
            stopCamera();
            resumeOverlay.style.display = 'flex';
        }
    }, 1000);
}

function startRecording() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const mode = modes[modeIndex];
    const recordFPS = mode.fps || 30;
    
    const stream = recCanvas.captureStream(recordFPS);
    
    if (audioStreamDestination) {
        const at = audioStreamDestination.stream.getAudioTracks();
        if(at.length > 0) stream.addTrack(at[0]);
    }
    
    if (sourceType === 'video') video.play();

    let selectedFormat = formatSelect.value;
    let options = {};
    
    if (selectedFormat === 'auto') {
        if (isIOS) {
            const iosCodecs = [
                'video/mp4',
                'video/mp4;codecs=avc1',
                'video/webm;codecs=vp8',
                'video/webm'
            ];
            for (const codec of iosCodecs) {
                if (MediaRecorder.isTypeSupported(codec)) {
                    options.mimeType = codec;
                    console.log("📱 iOS Auto selected:", codec);
                    break;
                }
            }
        } else {
            const desktopCodecs = [
                'video/webm;codecs=vp8',
                'video/webm;codecs=vp9',
                'video/mp4',
                'video/webm'
            ];
            for (const codec of desktopCodecs) {
                if (MediaRecorder.isTypeSupported(codec)) {
                    options.mimeType = codec;
                    console.log("💻 Desktop Auto selected:", codec);
                    break;
                }
            }
        }
    } else {
        if (MediaRecorder.isTypeSupported(selectedFormat)) {
            options.mimeType = selectedFormat;
            console.log("✅ User format supported:", selectedFormat);
        } else {
            console.warn("❌ Format not supported:", selectedFormat);
            showStatus(`${selectedFormat.split('/')[1].toUpperCase()} NOT SUPPORTED`, true);
            return;
        }
    }

    try {
        mediaRecorder = new MediaRecorder(stream, options);
    } catch (e) {
        console.warn("MediaRecorder init failed, using bare defaults", e);
        mediaRecorder = new MediaRecorder(stream);
    }
    
    recordedChunks = [];
    
    mediaRecorder.ondataavailable = e => { 
        if(e.data && e.data.size > 0) {
            recordedChunks.push(e.data);
        }
    };
    
    mediaRecorder.onstop = exportVideo;
    
    mediaRecorder.start(0);
    
    isRecording = true;
    shutterBtn.classList.add("recording");
    modeSelect.disabled = true;
    
    const usedFormat = mediaRecorder.mimeType || 'default';
    const formatName = usedFormat.includes('mp4') ? 'MP4' : 
                      usedFormat.includes('vp9') ? 'VP9' :
                      usedFormat.includes('vp8') ? 'VP8' : 'WEBM';
    showStatus(`REC: ${formatName} @ ${recordFPS}FPS`, false);
    setTimeout(() => status.style.display = 'none', 1500);
}

function stopRecording() {
    isRecording = false;
    shutterBtn.classList.remove("recording");
    
    setTimeout(() => {
        if(mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        }
        modeSelect.disabled = false;
    }, 100);
}

function exportVideo() {
    if (recordedChunks.length === 0) {
        showStatus("NO DATA RECORDED", true);
        return;
    }
        if (sourceType === 'video') {
            video.pause();
            video.currentTime = 0;
        }
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
    
    console.log(`✅ Export: ${blob.size} bytes, ${blob.type}`);
    
    if (blob.size === 0) {
        showStatus("ENCODING FAILED", true);
        if (sourceType === 'camera') {
            stopCamera();
            resumeOverlay.style.display = 'flex';
        }
        return;
    }

    const ext = (mediaRecorder.mimeType && mediaRecorder.mimeType.includes('mp4')) ? 'mp4' : 'webm';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${modes[modeIndex].name.replace(/\s/g,'_')}_${Date.now()}.${ext}`;
    a.click();

    showStatus("SAVED ✓", false);
    setTimeout(() => {
        status.style.display = 'none';
        if (sourceType === 'camera') {
            stopCamera();
            resumeOverlay.style.display = 'flex';
        }
    }, 1500);
}

modeSelect.onchange = (e) => {
    playSound('click');
    modeIndex = parseInt(e.target.value);
    const m = modes[modeIndex];
    w = m.w; h = m.h;
    
    FPS = m.fps || 30;
    FRAME_INTERVAL = 1000 / FPS;
    
    wbHuntStrength = 1.0;
    resizeBuffers();
    blurRange.value = m.def.blur; chromaRange.value = m.def.chroma || 30;
    
    lagRange.value = m.def.lag !== undefined ? m.def.lag : (m.def.track !== undefined ? 20 : (m.lagMult * 20));
    
    compressionRange.value = m.def.compression; sharpnessRange.value = m.def.sharpness;
    trackingRange.value = m.def.track;
    vhsControls.style.display = (m.type === "vhs") ? "flex" : "none";
    if (sourceType==='camera' && currentStream) initAudioProcessing(currentStream);
};

zoomRange.oninput = () => { zoomDisplay.innerText = (zoomRange.value/10).toFixed(1)+"x"; };

modeSelect.dispatchEvent(new Event('change'));
requestAnimationFrame(render);

window.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (status.style.display === 'none') {
        status.style.display = 'block';
        status.innerText = "DROP FILE TO IMPORT";
    }
});

window.addEventListener('dragleave', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (e.relatedTarget === null || e.clientX === 0 || e.clientY === 0) {
        status.style.display = 'none';
    }
});

window.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    status.style.display = 'none';
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        processImportFile(e.dataTransfer.files[0]);
    }
});

window.addEventListener('wheel', (e) => {
    if (e.target.closest('.controls')) return;
    const delta = Math.sign(e.deltaY) * -1;
    const current = parseInt(zoomRange.value);
    const newVal = Math.max(10, Math.min(75, current + delta * 2));
    if (newVal !== current) {
        zoomRange.value = newVal;
        zoomRange.dispatchEvent(new Event('input'));
    }
}, { passive: false });

let touchStartDist = 0;
let touchStartZoom = 10;

window.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
        touchStartDist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
        touchStartZoom = parseInt(zoomRange.value);
    }
});

window.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
        const dist = Math.hypot(
            e.touches[0].pageX - e.touches[1].pageX,
            e.touches[0].pageY - e.touches[1].pageY
        );
        const delta = dist - touchStartDist;
        const newVal = Math.max(10, Math.min(75, touchStartZoom + delta * 0.15));
        zoomRange.value = newVal;
        zoomRange.dispatchEvent(new Event('input'));
    }
});

setInterval(() => {
    const isCameraMode = sourceType === 'camera';
    const isAppActive = startScreen.style.display === 'none';
    const isPaused = resumeOverlay.style.display === 'flex';
    const isFailed = cameraFailOverlay.style.display === 'flex';

    if (isCameraMode && isAppActive && !isPaused && !isFailed) {
        const hasLiveVideo = currentStream && currentStream.getVideoTracks().some(t => t.readyState === 'live');
        const hasLiveAudio = currentStream && currentStream.getAudioTracks().some(t => t.readyState === 'live');
        
        if (!hasLiveVideo || !hasLiveAudio) {
            console.log("Stream Watcher: Lost tracks, restarting...");
            startCamera();
        }
    }
}, 3000);


</script>
